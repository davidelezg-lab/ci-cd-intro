name: CI Basica

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Descargar código
        uses: actions/checkout@v3
      
      - name: Ejecutar script
        run: node app.js

      - name: Ejecutar los tests
        run: node test.js

      - name: Deploy (simulado)
        run: echo "Desplegando la aplicación..."
